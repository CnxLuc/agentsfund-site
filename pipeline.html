<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair · Agent Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #07090d;
  --surface:   #0d1017;
  --surface2:  #131720;
  --surface3:  #1a1f2c;
  --border:    rgba(255,255,255,0.05);
  --border2:   rgba(255,255,255,0.09);
  --text:      #d4dae8;
  --text-dim:  #6b7a9a;
  --text-muted:#3d4a62;
  --amber:     #f59e0b;
  --amber-dim: rgba(245,158,11,0.10);
  --amber-br:  rgba(245,158,11,0.25);
  --green:     #10b981;
  --green-dim: rgba(16,185,129,0.10);
  --cyan:      #22d3ee;
  --cyan-dim:  rgba(34,211,238,0.08);
  --purple:    #a78bfa;
  --purple-dim:rgba(167,139,250,0.08);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,0.08);
  --font:      'IBM Plex Sans', system-ui, sans-serif;
  --mono:      'IBM Plex Mono', 'SF Mono', Consolas, monospace;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 44px;
  gap: 0;
}
.topbar-brand {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.04em;
  margin-right: 24px;
  flex-shrink: 0;
  text-decoration: none;
}
.topbar-brand span { color: var(--text-dim); font-weight: 400; margin-left: 6px; }
.topbar-sep {
  width: 1px; height: 18px;
  background: var(--border2);
  margin: 0 16px;
  flex-shrink: 0;
}
.topbar-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.topbar-nav a {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: -0.01em;
  transition: color 0.1s, background 0.1s;
  white-space: nowrap;
}
.topbar-nav a:hover { color: var(--text); background: var(--surface3); }
.topbar-nav a.active { color: var(--amber); background: var(--amber-dim); }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
  flex-shrink: 0;
}
.topbar-clock {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}

/* ── KPI BAR ── */
.kpi-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  height: 52px;
}
.kpi-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px 0 0;
  margin-right: 24px;
  border-right: 1px solid var(--border);
}
.kpi-item:first-child { padding-left: 0; }
.kpi-item:last-child { border-right: none; }
.kpi-label {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
}
.kpi-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: -0.03em;
  white-space: nowrap;
}

/* ── TOOLBAR ── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 38px;
}
.toolbar-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-right: 4px;
  flex-shrink: 0;
}
.filter-btn {
  font-family: var(--font);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: none;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: color 0.1s, background 0.1s;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--text); background: var(--surface3); }
.filter-btn.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.toolbar-sep { width: 1px; height: 16px; background: var(--border2); margin: 0 6px; flex-shrink: 0; }
.record-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-left: auto;
  flex-shrink: 0;
}

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto;
  min-height: calc(100vh - 44px - 52px - 38px - 48px);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}

thead {
  position: sticky;
  top: 134px; /* topbar + kpibar + toolbar */
  z-index: 50;
  background: var(--surface2);
}
thead th {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
  user-select: none;
  cursor: pointer;
  transition: color 0.1s;
}
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--amber); }
thead th:first-child { padding-left: 24px; width: 32px; }
thead th:last-child { padding-right: 24px; }
thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
thead th.sorted .sort-arrow { opacity: 1; }

tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.08s;
}
tbody tr:hover { background: var(--surface2); }
tbody tr.conviction-high {
  background: rgba(245,158,11,0.03);
}
tbody tr.conviction-high:hover { background: rgba(245,158,11,0.07); }
tbody tr.expanded { background: var(--surface2); }
tbody tr.detail-row { border-bottom: 1px solid var(--border2); }
tbody tr.detail-row > td {
  padding: 0;
  background: var(--surface);
}
tbody tr.detail-row.hidden { display: none; }

tbody td {
  padding: 9px 12px;
  vertical-align: middle;
  color: var(--text-dim);
}
tbody td:first-child { padding-left: 24px; }
tbody td:last-child { padding-right: 24px; }

/* conviction star */
.star-col { width: 32px; text-align: center; color: var(--text-muted); font-size: 11px; }
.star-col.high { color: var(--amber); font-size: 12px; }

/* rank */
.rank-col {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  width: 28px;
  text-align: right;
  padding-right: 8px !important;
}

/* name */
.name-col { min-width: 140px; }
.company-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  display: block;
}
.conviction-high .company-name { color: var(--amber); }

/* description */
.desc-col {
  color: var(--text-dim);
  font-size: 12px;
  max-width: 320px;
  line-height: 1.4;
}

/* category */
.cat-col { white-space: nowrap; }
.cat-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 2px;
  display: inline-block;
  white-space: nowrap;
}
.cat-agent     { background: var(--purple-dim); color: var(--purple); }
.cat-infra     { background: var(--cyan-dim);   color: var(--cyan);   }
.cat-tool      { background: var(--green-dim);  color: var(--green);  }
.cat-protocol  { background: var(--amber-dim);  color: var(--amber);  }

/* stage */
.stage-col { white-space: nowrap; }
.stage-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 2px;
  display: inline-block;
  white-space: nowrap;
}
.stage-invested   { background: rgba(16,185,129,0.12);  color: #10b981; }
.stage-candidate  { background: rgba(167,139,250,0.12); color: #a78bfa; }
.stage-researching{ background: rgba(34,211,238,0.08);  color: #22d3ee; }
.stage-scouting   { background: rgba(107,122,154,0.12); color: #6b7a9a; }

/* signal dots */
.signal-col { white-space: nowrap; min-width: 80px; }
.signal-dots { font-size: 10px; letter-spacing: 2px; }
.dot-on  { color: var(--amber); }
.dot-off { color: var(--text-muted); }

/* traction */
.traction-col {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--green);
  white-space: nowrap;
  min-width: 110px;
}

/* date */
.date-col {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* team */
.team-col {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* expand arrow */
.expand-col {
  color: var(--text-muted);
  font-size: 10px;
  width: 24px;
  text-align: center;
  transition: transform 0.15s;
}
tr.expanded .expand-col { transform: rotate(90deg); color: var(--amber); }

/* ── DETAIL PANEL ── */
.detail-panel {
  padding: 20px 24px 24px 80px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
}
.detail-section h4 {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.detail-section p {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.65;
}
.detail-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 2px;
}
.detail-metric-item { display: flex; flex-direction: column; gap: 2px; }
.detail-metric-v {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.detail-metric-l {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
}
footer span {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--amber); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* hidden rows */
tr.filtered { display: none; }
</style>
</head>

// RENDER
// ════════════════════════════════════════════════════════
const CAT_LABELS = { agent: "Agent", infrastructure: "Infra", tool: "Tool", protocol: "Protocol" };
const CAT_CLASS  = { agent: "cat-agent", infrastructure: "cat-infra", tool: "cat-tool", protocol: "cat-protocol" };

function dots(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    s += `<span class="${i <= n ? 'dot-on' : 'dot-off'}">●</span>`;
  }
  return `<span class="signal-dots">${s}</span>`;
}

function stageBadge(s) {
  const labels = { invested: "Invested", candidate: "Candidate", researching: "Researching", scouting: "Scouting" };
  return `<span class="stage-badge stage-${s}">${labels[s] || s}</span>`;
}

function formatDate(d) {
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const [y,m,dd] = d.split('-');
  return `${months[parseInt(m)-1]} ${dd}`;
}

function buildMetricsHTML(p) {
  if (!p.metrics) return '';
  const entries = Object.entries(p.metrics);
  return `<div class="detail-metrics">${entries.map(([k,v]) => `
    <div class="detail-metric-item">
      <span class="detail-metric-v">${v}</span>
      <span class="detail-metric-l">${k}</span>
    </div>`).join('')}</div>`;
}

let expandedSlug = null;
let activeStage = 'all';
let activeCat = 'all';

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  let rank = 0;
  let visible = 0;

  PROJECTS.forEach((p, i) => {
    const stageMatch = activeStage === 'all' || p.stage === activeStage;
    const catMatch   = activeCat === 'all'   || p.category === activeCat;
    const show = stageMatch && catMatch;
    if (show) { rank++; visible++; }

    // main row
    const tr = document.createElement('tr');
    tr.dataset.slug = p.slug;
    tr.dataset.stage = p.stage;
    tr.dataset.cat = p.category;
    if (p.conviction) tr.classList.add('conviction-high');
    if (!show) tr.classList.add('filtered');
    if (expandedSlug === p.slug) tr.classList.add('expanded');

    tr.innerHTML = `
      <td class="star-col ${p.conviction ? 'high' : ''}">${p.conviction ? '★' : ''}</td>
      <td class="rank-col">${show ? rank : ''}</td>
      <td class="name-col"><span class="company-name">${p.name}</span></td>
      <td class="desc-col">${p.oneLiner}</td>
      <td class="cat-col"><span class="cat-badge ${CAT_CLASS[p.category]}">${CAT_LABELS[p.category]}</span></td>
      <td class="stage-col">${stageBadge(p.stage)}</td>
      <td class="signal-col">${dots(p.signalStrength)}</td>
      <td class="traction-col">${p.tractionSignal}</td>
      <td class="team-col">${p.team}</td>
      <td class="date-col">${formatDate(p.addedDate)}</td>
      <td class="expand-col">▶</td>
    `;

    tr.addEventListener('click', () => toggleDetail(p.slug));
    tbody.appendChild(tr);

    // detail row
    const dtr = document.createElement('tr');
    dtr.classList.add('detail-row');
    if (expandedSlug !== p.slug) dtr.classList.add('hidden');
    if (!show) dtr.classList.add('filtered');

    dtr.innerHTML = `<td colspan="11">
      <div class="detail-panel">
        <div class="detail-section">
          <h4>Overview</h4>
          <p>${p.summary}</p>
        </div>
        <div class="detail-section">
          <h4>Metrics</h4>
          ${buildMetricsHTML(p)}
        </div>
        <div class="detail-section">
          <h4>Why Flagged</h4>
          <p>${p.whyFlagged}</p>
          <h4 style="margin-top:14px;">Team</h4>
          <p><strong style="color:var(--text)">${p.team}</strong> — ${p.teamBackground}</p>
        </div>
      </div>
    </td>`;
    tbody.appendChild(dtr);
  });

  document.getElementById('record-count').textContent = `${visible} companies`;
  document.getElementById('kpi-total').textContent = PROJECTS.length;
}

function toggleDetail(slug) {
  expandedSlug = expandedSlug === slug ? null : slug;
  renderTable();
}

// ── FILTERS ──
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStage = btn.dataset.filter;
    renderTable();
  });
});

document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderTable();
  });
});

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} UTC`;
}
updateClock();
setInterval(updateClock, 1000);

// ── INIT ──
renderTable();
</script>
